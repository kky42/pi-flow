name: Publish

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  npm:
    name: Publish npm package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          node <<'NODE'
          const { readFileSync } = require('node:fs');
          const pkg = JSON.parse(readFileSync('package.json', 'utf8'));
          const expected = `v${pkg.version}`;
          const actual = process.env.GITHUB_REF_NAME;
          if (actual !== expected) {
            console.error(`Tag/version mismatch: tag=${actual}, package.json=${pkg.version}, expected tag=${expected}`);
            process.exit(1);
          }
          console.log(`Publishing ${pkg.name}@${pkg.version}`);
          NODE

      - name: Typecheck and test
        run: npm run check

      - name: Configure npm token fallback
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            printf '//registry.npmjs.org/:_authToken=%s\n' "$NODE_AUTH_TOKEN" > ~/.npmrc
          else
            echo "No NPM_TOKEN secret configured; relying on npm Trusted Publishing (OIDC)."
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
